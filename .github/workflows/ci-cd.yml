name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-openapi:
    name: Validate OpenAPI spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npx --yes @redocly/cli lint contracts/openapi.yaml

  validate-asyncapi:
    name: Validate AsyncAPI spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npx --yes @asyncapi/cli validate contracts/asyncapi.yaml

  generate-openapi:
    name: Generate OpenAPI docs
    runs-on: ubuntu-latest
    needs: [validate-openapi]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/generate-contract-docs
        with:
          tool: redocly
          spec: contracts/openapi.yaml
          artifact: contracts-openapi

  generate-asyncapi:
    name: Generate AsyncAPI docs
    runs-on: ubuntu-latest
    needs: [validate-asyncapi]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/generate-contract-docs
        with:
          tool: asyncapi
          spec: contracts/asyncapi.yaml
          artifact: contracts-asyncapi

  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    needs: [generate-openapi, generate-asyncapi]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Download OpenAPI docs
        uses: actions/download-artifact@v4
        with:
          name: contracts-openapi
          path: dist/contracts/openapi

      - name: Download AsyncAPI docs
        uses: actions/download-artifact@v4
        with:
          name: contracts-asyncapi
          path: dist/contracts/asyncapi

      - name: Assemble dist
        run: cp -r web/. dist/

      - name: Generate config.js
        env:
          DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUDIENCE: ${{ vars.AUTH0_AUDIENCE }}
          API_BASE: ${{ vars.API_BASE }}
          CONFIG_OUTPUT: dist/config.js
        run: sh generate-config.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync dist/ s3://${{ vars.S3_BUCKET }}/ --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
